<html>
    <head>
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
         <style>
            body{
                background:linear-gradient(to right,#6876DF,#7354B0);
            }
            .card{
                width:400px;
                margin-left:350px;
                margin-top:80px;
                border-radius:20px;
            }
            .zippy{
                color:#FE8934;
            }
            #login{
                background:#FF6B6B;
                border-radius:20px;
                border-color:#FF6B6B;
                color:white;
                width:150px;
            }
            #register{
                background:#F0F0F0;
                border-color:#F0F0F0;
                border-radius:20px;
                color:black;
                width:150px;
            }
            #register:hover{
                background:#FF6B6B;
                border-color:#FF6B6B;
                color:white;
            }
            #buttons{
                background:linear-gradient(to right,#FF735C,#FF9A16);
                   border-color:#FE8934;
                color:white;
                border-radius:20px;
             
            }
            #mail{
                border-radius:20px;
            }
            #password{
                 border-radius:20px;

            }
          
         </style>
    </head>
    <body>
        <div class="container">
            <div class="card p-4 text-center">
                <h1 class="spoon">🍴</h1>
                <h3 class="zippy">Zippy Eats</h3>
                <p>Delicious food delivered to your door.</p>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <a href="login.html" class="btn" id="login">Login</a>
                    </div>
                    <div class="col-md-6">
                        <a href="signup.html" class="btn" id="register">Register</a>
                        </div>
                </div>
                        
                        <input type="email" id="mail" placeholder="use@zippyeats.com" class="form-control mt-4">
                         <input type="password" id="password" placeholder="Password" class="form-control mt-3">
                         <button onclick="login()" class="btn mt-4" id="buttons"><i class="bi bi-box-arrow-right"></i> Login</button>
                    
            </div>
        </div>
        <script>
            async function login() {
            let email = document.getElementById("mail").value;
            let password = document.getElementById("password").value;
        let response = await fetch(`http://localhost:8080/login?email=${email}&password=${password}`,
            {
                method:"POST"
            }
        );
        let data = await response.text();
        if(data =="success"){
            window.location.href = "dashboard.html";
        }
        else{
            alert("Invalid email or password");
        }
                
            }
        </script>
    </body>
</html>
