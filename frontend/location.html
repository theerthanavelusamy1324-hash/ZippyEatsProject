<html>
    <head>
        <title>Location</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
        <style>
             body{
            background:#FFF6EF;
        }
        .navbar-brand{
            color:#FF9737;
        }
        a{
            text-decoration:none;
        }
         #map{
            border-color:lightgray;
            color:black;
            border-radius:10px;
            width:650px;
            padding:5px;
            margin-left:10px;
        }
        .demo{
            background:#FFF3CD;
            color:#A78935;
            border-color:#FFF3CD;
            width:300px;
            margin-left:200px;
            padding:5px;
            font-size:18px;
        }
        .card{
            border-radius:20px;
            border:none;
        }
        #number{
            border-radius:10px;
            width:300px;
            margin-left:200px;
        }
        #verify{
            background:linear-gradient(to right,#FF735D,#FF9C13);
            border-color:#FF9737;
            border-radius:20px;
            color:white;
            width:300px;
            margin-left:200px;
        }
        #totalamount{
            color:#FF735D;
            font-size:20px;
            font-weight:bold;
        }
        </style>
    </head>
    <body>
        <nav class="navbar bg-white">
            <span class="navbar-brand ms-5">🍔<b>Zippy Eats</b></span>
            <div class="items d-flex gap-4">
            <a href="cart.html" class="me-5 text-dark">←Back to cart</a>
                </div>
        </nav>
        <div class="container">
        <div class="row mt-4">
            <div class="col-md-8">
                <div class="card p-4">
                    <h3>📍Delivery Address</h3>
                    <textarea row="4" placeholder="Enter your Address.." id="src"></textarea>
                     <iframe id="frame" src="https://www.google.com/maps?q=Bangalore&output=embed" class="mt-3"></iframe>
                     <input type="text" id="des" placeholder="Enter Landmark" class="form-control mt-4">
                     <button onclick="viewmap()" id="map" class="mt-4"><i class="bi bi-book"></i>  View Route on Map</button>
                     
                </div>
                <div class="card p-3 mt-4 text-center">
                    <h5>🔐OTP Verification</h5>
                    <p>We'll send a verification code to verify your order</p>
                    <p class="demo">Demo OTP:<span id="otp"></span></p>
                    <input type="number" id="number" placeholder="Enter otp" class="form-control mt-3">
                    <button onclick="verify()" class="btn mt-4" id="verify">Verify & Continue →</button>
                </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-4">
                        <h5>Order Summary</h5>
                        <div id="summary"></div>
                        <hr>
                        <div class="row mt-4">
                            <div class="col-md-6">
                                <p>Total Amount:</p>
                            </div>
                            <div class="col-md-6">
                                <p id="totalamount"><b>₹0</b></p>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
        <script>
            let otp = Math.floor (1000 + Math.random() * 9000);
document.getElementById("otp").innerHTML = otp;
             function viewmap(){
                   
                let src = document.getElementById("src").value;
                    let dest = document.getElementById("des").value;
                    document.getElementById("frame").src = `https://www.google.com/maps?q=${encodeURIComponent(src)}+to+${encodeURIComponent(dest)}&output=embed`;


                }
                async function getitems() {
                
                    let response = await fetch(`http://localhost:8080/menus`);
                    let data = await response.json();
                    let summary = "";
                    let total = 0;
                    console.log(data);
                    for(let f of data){
                        total = total + Number(f.price);
                        summary+=`
                        <div class="row">
                            <div class="col-md-6">
                                <p>${f.name}</p>
                                </div>
                                 <div class="col-md-6">
                                    <p>₹${f.price}</p>
                                    </div>
                                    </div>
                                    `;
                    document.getElementById("totalamount").innerHTML = "₹" +total;
                                    

                    }
                    document.getElementById("summary").innerHTML = summary;
                    
                }
                getitems();
                function verify(){
                    let number = document.getElementById("number").value;
                    if(number == ""){
                        alert("Enter otp");
                    }
                    else{
                    window.location.href="payment.html";
                    }
                }
        </script>
    </body>
</html>
