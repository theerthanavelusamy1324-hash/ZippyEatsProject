<html>
    <head>
        <title>Payment</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
      <style>
         body{
            background:#FFF6EF;
        }
        .navbar-brand{
            color:#FF9737;
        }
        #upi{
            border-color:#E7E7E7;
            border-radius:20px;
            background:white;
            padding:5px;
        }
        #upi:hover{
            border-color:#ED7271;
            background:#FFF0ED;
             padding:5px;
                 border-radius:20px;
        }
        #pay{
            background:linear-gradient(to right,#FF735D,#FF9C13);
            border-color:#FF9737;
            border-radius:20px;
            color:white;
            width:400px;
            margin-left:40px;
            padding:5px;
           
        }
        #result{
            padding:20px;
        }
        .card{
            border-radius:10px;
            border:none;
        }
        #apply{
            background:#FD6C68;
            color:white;
           
        }
        #fulltotal{
            color:#ED7271;
            font-size:20px;
            font-weight:bold;
        }
        .demo{
            background:#CFF4FC;
            border-color:#CFF4FC;
            color:#3996AD;
            padding:10px;
            text-align:center;
        }
      </style> 
    </head>
    <body>
        <nav class="navbar bg-white">
            <span class="navbar-brand ms-5">🍔<b>Zippy Eats</b></span>
            <div class="items d-flex gap-4">
           <p class="me-5">✅Secure Payment</p>
                </div>
        </nav>
        <div class="container">
            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card p-3">
                        <h5>💳Payment Methods</h5>
                        <div>
                    <button onclick="upi()" id="upi"> 📱UPI</button>
                    <button onclick="card()" id="upi" class="ms-4"> 💳 card</button>
                     <button onclick="net()" id="upi" class="ms-4">🏦 Net Banking</button>
                    <button onclick="wallet()" id="upi" class="ms-4"> 💰Wallet</button>
                    <div id="result" class="mt-4 bg-light"></div>
                    <button onclick="pay()" id="pay" class="mt-5"><i class="bi bi-lock"></i>Pay now</button>
                    </div>
                    </div>
                      </div>
                    <div class="col-md-6">
                        <h5>Order Summary</h5>
                        <div id="ordersummary"></div>
                        <hr>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <p>Subtotal</p>
                            </div>
                            <div class="col-md-6">
                                <p id="subtotals">₹0</p>
                            </div>
                        </div>
                         <div class="row mt-3">
                            <div class="col-md-6">
                                <p>Delivery Fee</p>
                            </div>
                            <div class="col-md-6">
                                <p>₹40</p>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <p>Coupon Discount</p>
                            </div>
                            <div class="col-md-6">
                                <p class="text-success">₹10%</p>
                            </div>
                        </div>
                        <div class="input-group mt-4">
                            <input type="text" id="text" placeholder="ZIPPY10" class="form-control">
                        <button onclick="apply()" class="btn" id="apply">Apply</button>
                        </div>
                        <hr>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <p><b>Total</b></p>
                            </div>
                            <div class="col-md-6">
                                <p id="fulltotal">₹</p>
                            </div>
                        </div>
                        <p class="demo">Demo coupon ZIPPY10 for 10% off </p>
                  
                </div>
            </div>
        </div>
        <script>
            function upi(){
            document.getElementById("result").innerHTML = `
            <div class="input-group">
            <p><b> G Pay </b></P>
                <p><b> P pay </b></P>
                     </div>
                    <p> <b> UPI ID:</b> zippy eats@okhdfcbank</p>
                    <input type="text" class="form-control mt-3" placeholder="Enter UPI" id="upi">
                   
                    `;
        }
        function card(){
            document.getElementById("result").innerHTML = `
            <input type="number" placeholder="Card Number" class="form-control mt-3">
            <div class="input-group">
                <input type="number" placeholder="MM/YY" class="form-control mt-3">
                <input type="number" placeholder="CVV" class="form-control mt-3">
                </div>
                `;
            
        }
        function net(){
            document.getElementById("result").innerHTML = `
            <select class="form-select mt-3">
                <option> SBI Bank </option>
                 <option> HDFC Bank </option>
                  <option> ICICI Bank </option>
                   <option> Axis Bank </option>
                   </select>
                   `;
        }
        function wallet(){
            document.getElementById("result").innerHTML = `
            <h1>👛</h1>
            <p> Wallet Balance:500 </p>
            <button onclick="paywallet()" class="btn btn-danger mt-3"> Pay with Wallet </button>
            `;
        }
        async function loaditems() {
           
            let response = await fetch(`http://localhost:8080/menus`);
            let data = await response.json();
            let order = "";
            let total = 0;
            console.log(data);
            for(let n of data){
                total = total + Number(n.price);
                order+=`
                <div class="row">
                    <div class="col-md-6">
                        <p>${n.name}</p>
                        </div>
                        <div class="col-md-6">
                            <p> ₹${n.price}</p>
                            </div>
                            </div>
                            `;
              document.getElementById("subtotals").innerHTML = "₹" + total;
            }
            document.getElementById("ordersummary").innerHTML = order;
            
            
        }
        loaditems();
        async function apply(){
             let text = document.getElementById("text").value;
            
            let response = await fetch(`http://localhost:8080/menus`);
            let data = await response.json();
             let total = 0;
             let discount = 0;
             let code = "ZIPPY10";
            console.log(data);
            for(let n of data){
                total = total + Number(n.price);
                discount = total * 10/100;
               
                if(code === "ZIPPY10"){
                finalamount = total - discount + 40;
                document.getElementById("fulltotal").innerHTML = "₹" +finalamount;
                }
              
               
                 let msg = document.createElement("div");
    msg.innerText= "10% Discount applied... !"
     msg.style.position = "fixed";
     msg.style.bottom = "20px";
    msg.style.background = "green";
    msg.style.marginLeft= "1050px";
    msg.style.borderRadius = "20px";
     msg.style.color = "white";
    msg.style.padding = "10px";
    document.body.appendChild(msg);
    setTimeout(()=> msg.remove(), 4000);
    window.location.href="dashboard.html";
                
            }
             

        }
        </script>
    </body>
</html>
